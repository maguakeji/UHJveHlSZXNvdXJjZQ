# Shadowrocket: 2026-04-12 01:34:39

[General]
# 旁路系统
bypass-system = true

# 启用IPv6
ipv6 = false

# 首选IPv6
prefer-ipv6 = false

# 接管模式
compatibility-mode = 3

# 私有应答
private-ip-answer = true

# 自动回复
icmp-auto-reply = true

# 排除线路
tun-excluded-routes = 239.255.255.250/32, 24.105.30.129/32, 185.60.112.157/32, 185.60.112.158/32, 182.162.132.1/32

# 备用DNS
fallback-dns-server = 223.5.5.5, 119.29.29.29

# DNS覆写
dns-server = https://doh.pub/dns-query, https://dns.alidns.com/dns-query

# 直连域名规则使用系统DNS查询
dns-direct-system = false

# 直连域名DNS解析失败使用代理
dns-direct-fallback-proxy = true

# 重写拒绝策略默认配置模式生效
always-reject-url-rewrite = false

# UDP回退策略
udp-policy-not-supported-behaviour = REJECT

# 更新配置文件
#update-url = https://raw.githubusercontent.com/Centralmatrix3/Matrix-io/master/Shadowrocket/Matrix.conf

update-url = https://raw.githubusercontent.com/maguakeji/UHJveHlSZXNvdXJjZQ/refs/heads/main/6YWN572u5paH5Lu2/Shadowrocket/%E4%B8%AA%E4%BA%BA%E9%85%8D%E7%BD%AE.conf

