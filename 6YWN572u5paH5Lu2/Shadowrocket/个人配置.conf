# 备用DNS
fallback-dns-server = system

# 启用IPv6
ipv6 = false

# 首选IPv6
prefer-ipv6 = false

# 直连域名DNS解析失败使用代理
dns-fallback-system = false

# 直连域名规则使用系统DNS查询
